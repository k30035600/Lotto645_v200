# 정적 HTML → GitHub Pages (GitHub 스타터 static.yml과 동일 구조)
# Settings → Pages → Source: GitHub Actions
# 저장소 Settings → Actions → General → Workflow permissions: "Read and write" 필요할 수 있음
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          # .source/, .nojekyll 등 점(.) 경로 포함 (기본은 제외됨)
          include-hidden-files: true
      - id: deployment
        uses: actions/deploy-pages@v5
