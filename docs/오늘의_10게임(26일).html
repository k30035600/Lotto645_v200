<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 테마 로또 10게임 픽</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            background: var(--bg-color);
            background-image: radial-gradient(circle at top right, #1e1b4b, #0f172a 50%, #020617);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
            line-height: 1.6;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            gap: 1.5rem;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
        }

        .category-group {
            grid-column: 1 / -1;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 0.5rem;
        }

        .category-group h2 {
            font-size: 1.5rem;
            color: #cbd5e1;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
            border-color: rgba(56, 189, 248, 0.4);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #f1f5f9;
        }

        .balls-container {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .ball {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 800;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            box-shadow: inset -3px -3px 6px rgba(0,0,0,0.3), 3px 3px 8px rgba(0,0,0,0.3);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards;
        }
        
        .ball.fixed {
            border: 3px solid #fff;
            box-shadow: 0 0 15px rgba(255,255,255,0.8), inset -3px -3px 6px rgba(0,0,0,0.3);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .reason {
            color: var(--text-secondary);
            font-size: 0.95rem;
            background: rgba(0, 0, 0, 0.2);
            padding: 1rem;
            border-radius: 8px;
            border-left: 3px solid var(--accent);
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>🎰 2026-03-26 테마 로또 10게임</h1>
        <p class="subtitle">다양한 테마와 필터링 조건이 적용된 10게임의 통계적, 감성적 분석 노트입니다. `Lotto_v200` 앱 인터페이스 영감 테스트로 활용해 보세요!</p>
    </header>

    <div class="container" id="app">
        <!-- Content will be injected by JavaScript -->
    </div>

    <script>
        const data = [
            {
                category: "1. 극단적 홀짝 비율",
                icon: "🎲",
                games: [
                    { title: "[1게임] 전원 짝수 (0:6)", numbers: [4, 8, 20, 24, 30, 34], reason: "짝수만의 묵직한 힘을 모은 조합입니다. 다수의 선택을 피할 수 있는 역발상의 실험적 선택지입니다." },
                    { title: "[2게임] 전원 홀수 (6:0)", numbers: [3, 5, 11, 17, 31, 43], reason: "홀수로만 꽉꽉 채워진 과감한 조합입니다. 극단적 비율을 취함으로써 독보적인 단독 당첨 확률을 노립니다." }
                ]
            },
            {
                category: "2. 아스트랄 길몽 픽",
                icon: "🐖",
                games: [
                    { title: "[3게임] 비행하는 복돼지", numbers: [8, 12, 17, 33, 36, 42], reason: "재물운을 상징하는 돼지와 하늘로 비상하는 대박(기적)의 상징 번호들이 만난 완벽한 조합입니다." }
                ]
            },
            {
                category: "3. 우울한 비 오는 날, 콜드(Cold) 반란",
                icon: "☔",
                games: [
                    { title: "[4게임] 차갑게 식은 심연", numbers: [2, 9, 13, 22, 38, 41], reason: "아래로 침전하며 최근 출몰을 자제해온 깊은 속뜻을 지닌 콜드 번호 조합입니다." },
                    { title: "[5게임] 우산 속의 고요", numbers: [4, 16, 25, 32, 40, 44], reason: "인기가 덜한 중후반 구간에 웅크리고 있던 침묵의 콜드 번호 묵직한 조합입니다." },
                    { title: "[6게임] 빗방울의 파동", numbers: [9, 13, 25, 29, 35, 45], reason: "수면 위 파문처럼 연쇄로 튀기 쉬운 번호 패턴, 강렬한 한 방 조합입니다." },
                    { title: "[7게임] 안개 낀 저녁", numbers: [2, 16, 22, 29, 32, 40], reason: "습하고 가라앉은 기압에서 강한 모습을 유지하는 안정적인 짝수 위주의 생명력." },
                    { title: "[8게임] 먹구름 뒤의 한 방", numbers: [4, 13, 25, 35, 41, 44], reason: "전혀 예상 밖 비인기 번호들이 단번에 쏟아져 나와 반전 매력을 보여줍니다." }
                ]
            },
            {
                category: "4. 선호 번호(고정수)",
                icon: "🎯",
                games: [
                    { title: "[9게임] 안정감의 교과서", numbers: [7, 18, 29, 33, 40, 44], fixed: [29, 33], reason: "강력한 허리 역할의 고정 번호 29, 33을 필두로 단단한 지붕(40,44)을 설계한 최고의 밸런스." }
                ]
            },
            {
                category: "5. 소수(Prime) 필터결정체",
                icon: "📐",
                games: [
                    { title: "[10게임] 5주 장기결석 중인 100% 소수", numbers: [3, 13, 19, 31, 37, 43], reason: "가장 신성한 математиical purity '소수' 중 최근 안 나온 숫자만 뭉친 강철의 동맹." }
                ]
            }
        ];

        // 동행복권 공 색상 조합을 CSS 그라데이션으로 리턴
        function getBallColor(num) {
            if (num <= 10) return "linear-gradient(135deg, #fbc400, #d4a000)"; 
            if (num <= 20) return "linear-gradient(135deg, #69c8f2, #3b9ac4)"; 
            if (num <= 30) return "linear-gradient(135deg, #ff7272, #d14d4d)"; 
            if (num <= 40) return "linear-gradient(135deg, #aaa, #777)";        
            return "linear-gradient(135deg, #b0d840, #8bad2a)";               
        }

        document.addEventListener('DOMContentLoaded', () => {
            const app = document.getElementById('app');
            let globalCardIndex = 0;

            data.forEach(group => {
                const groupTitle = document.createElement('div');
                groupTitle.className = 'category-group';
                groupTitle.innerHTML = `<h2>${group.icon} ${group.category}</h2>`;
                app.appendChild(groupTitle);

                const groupContainer = document.createElement('div');
                groupContainer.style.display = 'contents';

                group.games.forEach((game) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.style.animationDelay = `${globalCardIndex * 0.1}s`;

                    let ballsHTML = game.numbers.map((num, idx) => {
                        const bg = getBallColor(num);
                        const isFixed = game.fixed && game.fixed.includes(num);
                        const delay = (globalCardIndex * 0.1) + (idx * 0.05);
                        return `<div class="ball ${isFixed ? 'fixed' : ''}" style="background: ${bg}; animation-delay: ${delay}s" title="${isFixed ? '고정수 (Fixed)' : ''}">${num}</div>`;
                    }).join('');

                    card.innerHTML = `
                        <div class="card-header">
                            <div class="card-title">${game.title}</div>
                        </div>
                        <div class="balls-container">
                            ${ballsHTML}
                        </div>
                        <div class="reason">
                            ${game.reason}
                        </div>
                    `;
                    groupContainer.appendChild(card);
                    globalCardIndex++;
                });

                app.appendChild(groupContainer);
            });
        });
    </script>
</body>
</html>
